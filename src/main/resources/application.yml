spring:
  application:
    name: rwaknow-smartstore

  datasource:
    url: jdbc:postgresql://localhost:5432/smartstore_db
    username: postgres
    password: bill123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  graphql:
    graphiql:
      enabled: true
      path: /graphiql

server:
  port: 8080

logging:
  level:
    com.rwaknow: DEBUG

cloudinary:
  cloud-name: your_cloud_name
  api-key: your_api_key
  api-secret: your_api_secret

jwt:
  secret: your-secret-key-change-in-production
  expiration: 86400000

mpesa:
  consumer-key: your_consumer_key
  consumer-secret: your_consumer_secret
  shortcode: 174379
  passkey: your_passkey
  callback-url: http://localhost:8080/api/public/mpesa/callback
  api-url: https://sandbox.safaricom.co.ke
  environment: sandbox